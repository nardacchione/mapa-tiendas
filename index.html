<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Tiendas — Changomas</title>

<!-- Leaflet CSS primero, síncrono -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f4f6f9;color:#1a1a2e;}

.app{display:grid;grid-template-columns:360px 1fr;grid-template-rows:56px 1fr;height:100vh;overflow:hidden;}
.topbar{grid-column:1/-1;background:#1F3864;display:flex;align-items:center;gap:14px;padding:0 18px;}
.topbar h1{color:#fff;font-size:15px;font-weight:700;}
.topbar .badge{background:rgba(255,255,255,.18);color:#fff;font-size:11px;padding:3px 9px;border-radius:12px;}
.print-btn{margin-left:auto;background:#2E75B6;color:#fff;border:none;padding:6px 14px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:700;display:none;}
.print-btn:hover{background:#1a5490;}

.sidebar{background:#fff;border-right:1px solid #dde3ed;display:flex;flex-direction:column;overflow:hidden;}
.search-area{padding:12px 14px;border-bottom:1px solid #eee;}
.search-area input{width:100%;padding:8px 11px;border:1px solid #cdd5e0;border-radius:6px;font-size:13px;outline:none;}
.search-area input:focus{border-color:#2E75B6;}
.filter-row{display:flex;gap:6px;margin-top:7px;}
.filter-row select{flex:1;padding:5px 7px;border:1px solid #cdd5e0;border-radius:5px;font-size:11px;}
.list-wrap{overflow-y:auto;flex:1;}
.item{padding:10px 14px;border-bottom:1px solid #f0f2f6;cursor:pointer;display:flex;align-items:center;gap:9px;}
.item:hover{background:#f5f8fc;}
.item.active{background:#EBF3FC;border-left:3px solid #2E75B6;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.iname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.isub{font-size:11px;color:#888;margin-top:1px;}

#map-container{width:100%;height:100%;}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.card{background:#fff;border-radius:10px;width:500px;max-width:94vw;overflow:hidden;}
.card-head{background:#1F3864;padding:16px 18px;display:flex;align-items:center;gap:12px;}
.card-badge{padding:4px 10px;border-radius:5px;font-size:12px;font-weight:800;}
.card-head h2{color:#fff;font-size:16px;font-weight:700;flex:1;}
.card-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:22px;cursor:pointer;line-height:1;}
.card-close:hover{color:#fff;}
.mini-map{height:180px;width:100%;}
.card-body{padding:14px 18px 16px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;margin-bottom:12px;}
.f{display:flex;flex-direction:column;gap:2px;}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#999;}
.fv{font-size:13px;font-weight:600;color:#1a1a2e;}
.fv-pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700;}
.fd{grid-column:1/-1;}
.card-foot{display:flex;justify-content:flex-end;gap:8px;padding-top:10px;border-top:1px solid #eee;}
.btn{padding:6px 14px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:700;border:1px solid;}
.btn-p{background:#1F3864;color:#fff;border-color:#1F3864;}
.btn-s{background:#fff;color:#666;border-color:#ccc;}

/* PRINT */
@media print {
  @page{size:A4 portrait;margin:14mm 12mm 12mm;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .app,.overlay{display:none!important;}
  .ps{display:block!important;}
}
.ps{display:none;}
.ps-hd{display:flex;align-items:center;gap:14px;border-bottom:3px solid #1F3864;padding-bottom:10px;margin-bottom:14px;}
.ps-badge{padding:6px 12px;border-radius:6px;font-size:14px;font-weight:800;}
.ps-hd h1{font-size:19px;font-weight:800;color:#1F3864;}
.ps-hd p{font-size:12px;color:#666;margin-top:2px;}
.ps-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 16px;margin-bottom:12px;}
.ps-f{display:flex;flex-direction:column;gap:2px;}
.ps-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888;}
.ps-v{font-size:13px;font-weight:600;color:#1a1a2e;}
.ps-fd{grid-column:1/-1;}
.ps-map{height:210px;border:1px solid #ccc;border-radius:6px;overflow:hidden;margin-bottom:12px;}
.ps-foot{font-size:9px;color:#aaa;text-align:right;border-top:1px solid #eee;padding-top:5px;}
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <h1>Directorio de Tiendas — Changomas</h1>
    <span class="badge" id="badge">93 tiendas</span>
    <button class="print-btn" id="btnPrint" onclick="doPrint()">Imprimir ficha A4</button>
  </div>
  <div class="sidebar">
    <div class="search-area">
      <input id="q" type="text" placeholder="Buscar número, nombre o coordinador..." oninput="filter()">
      <div class="filter-row">
        <select id="fc" onchange="filter()">
          <option value="">Todos los coordinadores</option>
          <option value="German Haller">German Haller</option>
          <option value="Nicolas Castiglione">Nicolas Castiglione</option>
          <option value="Pedro Nardacchione">Pedro Nardacchione</option>
        </select>
        <select id="ff" onchange="filter()">
          <option value="">Todos los formatos</option>
          <option value="HC">Hiper Changomas</option>
          <option value="CH">Changomas</option>
          <option value="SC">Super Changomas</option>
        </select>
      </div>
    </div>
    <div class="list-wrap" id="listWrap"></div>
  </div>
  <div id="map-container"></div>
</div>

<!-- FICHA POPUP -->
<div class="overlay" id="ov" onclick="closeOv(event)">
  <div class="card">
    <div class="card-head">
      <span class="card-badge" id="cBadge"></span>
      <h2 id="cTitle"></h2>
      <button class="card-close" onclick="closeOvDirect()">×</button>
    </div>
    <div class="mini-map" id="miniMap"></div>
    <div class="card-body">
      <div class="fg">
        <div class="f"><span class="fl">Coordinador</span><span class="fv" id="cCoord"></span></div>
        <div class="f"><span class="fl">Director</span><span class="fv" id="cDir"></span></div>
        <div class="f"><span class="fl">Regional</span><span class="fv" id="cReg"></span></div>
        <div class="f"><span class="fl">Gerente</span><span class="fv" id="cGer"></span></div>
        <div class="f fd"><span class="fl">Dirección</span><span class="fv" id="cDireccion"></span></div>
      </div>
      <div class="card-foot">
        <button class="btn btn-s" onclick="closeOvDirect()">Cerrar</button>
        <button class="btn btn-p" onclick="doPrint()">Imprimir ficha A4</button>
      </div>
    </div>
  </div>
</div>

<!-- HOJA A4 -->
<div class="ps" id="ps">
  <div class="ps-hd">
    <span class="ps-badge" id="psBadge"></span>
    <div><h1 id="psTitle"></h1><p id="psSub"></p></div>
  </div>
  <div class="ps-grid">
    <div class="ps-f"><span class="ps-l">Coordinador</span><span class="ps-v" id="psCoord"></span></div>
    <div class="ps-f"><span class="ps-l">Director</span><span class="ps-v" id="psDir"></span></div>
    <div class="ps-f"><span class="ps-l">Regional</span><span class="ps-v" id="psReg"></span></div>
    <div class="ps-f"><span class="ps-l">Gerente</span><span class="ps-v" id="psGer"></span></div>
    <div class="ps-f"><span class="ps-l">Formato</span><span class="ps-v" id="psFmt"></span></div>
    <div class="ps-f"><span class="ps-l">Número de tienda</span><span class="ps-v" id="psNum"></span></div>
    <div class="ps-f ps-fd"><span class="ps-l">Dirección</span><span class="ps-v" id="psDireccion"></span></div>
  </div>
  <div class="ps-map" id="psMapDiv"></div>
  <div class="ps-foot" id="psFoot"></div>
</div>

const CC = {
  "German Haller":      {bg:"#E2EFDA", fg:"#375623"},
  "Nicolas Castiglione":{bg:"#DDEBF7", fg:"#1F3864"},
  "Pedro Nardacchione": {bg:"#FCE4D6", fg:"#833C00"}
};
const FC = {
  HC:{bg:"#C6EFCE",fg:"#375623"},
  CH:{bg:"#DDEBF7",fg:"#1F3864"},
  SC:{bg:"#FCE4D6",fg:"#833C00"}
};

let mainMap = null;
let miniMapInst = null;
let psMapInst = null;
let markers = [];
let current = null;
let vis = TS;

function icon(t, active) {
  const c = CC[t.coordinador] || {bg:"#eee", fg:"#555"};
  const sz = t.fmt === "HC" ? 18 : t.fmt === "SC" ? 12 : 14;
  const br = t.fmt === "SC" ? "3px" : "50%";
  const bw = t.fmt === "HC" ? 3 : 2;
  const bc = active ? "#E07B00" : c.fg;
  return L.divIcon({
    className: "",
    html: `<div style="width:${sz}px;height:${sz}px;border-radius:${br};background:${c.bg};border:${bw}px solid ${bc};box-sizing:border-box;"></div>`,
    iconSize: [sz, sz],
    iconAnchor: [sz/2, sz/2]
  });
}

function initMainMap() {
  mainMap = L.map("map-container", {center: [-36, -64], zoom: 4});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap", maxZoom: 19
  }).addTo(mainMap);
  renderMarkers(TS);
  renderList(TS);
}

function renderMarkers(list) {
  markers.forEach(m => m.remove());
  markers = [];
  list.forEach(t => {
    if (!t.lat) return;
    const m = L.marker([t.lat, t.lon], {icon: icon(t, false)});
    m._num = t.num;
    m.on("click", () => openStore(t));
    m.addTo(mainMap);
    markers.push(m);
  });
}

function renderList(list) {
  document.getElementById("badge").textContent = list.length + " tiendas";
  const el = document.getElementById("listWrap");
  if (!list.length) {
    el.innerHTML = '<div style="padding:24px;text-align:center;color:#aaa;font-size:13px;">Sin resultados</div>';
    return;
  }
  el.innerHTML = list.map(t => {
    const c = CC[t.coordinador] || {fg:"#888"};
    return `<div class="item" id="i${t.num}" onclick="openStore(TS.find(x=>x.num==='${t.num}'))">
      <div class="dot" style="background:${c.fg}"></div>
      <div style="flex:1;min-width:0;">
        <div class="iname">${t.nombre}</div>
        <div class="isub">${t.num} · ${t.fmt_label}</div>
      </div>
    </div>`;
  }).join("");
}

function filter() {
  const q = document.getElementById("q").value.toLowerCase();
  const fc = document.getElementById("fc").value;
  const ff = document.getElementById("ff").value;
  vis = TS.filter(t => {
    const mq = !q || t.num.includes(q) || t.nombre.toLowerCase().includes(q) || t.coordinador.toLowerCase().includes(q);
    return mq && (!fc || t.coordinador === fc) && (!ff || t.fmt === ff);
  });
  renderList(vis);
  renderMarkers(vis);
}

function openStore(t) {
  current = t;
  // actualizar íconos
  markers.forEach(m => {
    const st = TS.find(x => x.num === m._num);
    if (st) m.setIcon(icon(st, m._num === t.num));
  });
  // resaltar en lista
  document.querySelectorAll(".item").forEach(i => i.classList.remove("active"));
  const li = document.getElementById("i" + t.num);
  if (li) { li.classList.add("active"); li.scrollIntoView({block:"nearest"}); }
  // centrar mapa
  if (t.lat) mainMap.setView([t.lat, t.lon], 13, {animate:true});

  const c = CC[t.coordinador] || {bg:"#eee", fg:"#333"};
  const f = FC[t.fmt] || {bg:"#eee", fg:"#333"};

  // llenar popup
  document.getElementById("cBadge").textContent = t.fmt;
  document.getElementById("cBadge").style.background = f.bg;
  document.getElementById("cBadge").style.color = f.fg;
  document.getElementById("cTitle").textContent = t.num + " — " + t.nombre;
  document.getElementById("cCoord").innerHTML = `<span class="fv-pill" style="background:${c.bg};color:${c.fg}">${t.coordinador}</span>`;
  document.getElementById("cDir").textContent = t.director;
  document.getElementById("cReg").textContent = t.regional;
  document.getElementById("cGer").textContent = t.gerente;
  document.getElementById("cDireccion").textContent = t.direccion;
  document.getElementById("btnPrint").style.display = "inline-block";

  document.getElementById("ov").classList.add("open");

  // mini mapa
  document.getElementById("miniMap").innerHTML = "";
  if (t.lat) {
    setTimeout(() => {
      if (miniMapInst) { miniMapInst.remove(); miniMapInst = null; }
      const div = document.createElement("div");
      div.style.cssText = "width:100%;height:100%;";
      document.getElementById("miniMap").appendChild(div);
      miniMapInst = L.map(div, {zoomControl:false, attributionControl:false}).setView([t.lat, t.lon], 14);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(miniMapInst);
      L.marker([t.lat, t.lon], {icon: icon(t, true)}).addTo(miniMapInst);
      miniMapInst.invalidateSize();
    }, 60);
  }
}

function closeOv(e) { if (e.target === document.getElementById("ov")) closeOvDirect(); }
function closeOvDirect() {
  document.getElementById("ov").classList.remove("open");
  if (miniMapInst) { miniMapInst.remove(); miniMapInst = null; }
}

function doPrint() {
  if (!current) return;
  const t = current;
  const c = CC[t.coordinador] || {bg:"#eee", fg:"#333"};
  const f = FC[t.fmt] || {bg:"#eee", fg:"#333"};

  document.getElementById("psBadge").textContent = t.fmt_label;
  document.getElementById("psBadge").style.background = f.bg;
  document.getElementById("psBadge").style.color = f.fg;
  document.getElementById("psTitle").textContent = t.num + " — " + t.nombre;
  document.getElementById("psSub").textContent = "Changomas · Directorio de Tiendas";
  document.getElementById("psCoord").innerHTML = `<span style="background:${c.bg};color:${c.fg};padding:2px 8px;border-radius:4px;">${t.coordinador}</span>`;
  document.getElementById("psDir").textContent = t.director;
  document.getElementById("psReg").textContent = t.regional;
  document.getElementById("psGer").textContent = t.gerente;
  document.getElementById("psFmt").textContent = t.fmt_label;
  document.getElementById("psNum").textContent = t.num;
  document.getElementById("psDireccion").textContent = t.direccion;
  document.getElementById("psFoot").textContent = "Generado el " + new Date().toLocaleDateString("es-AR", {day:"2-digit", month:"long", year:"numeric"}) + " · Changomas";

  document.getElementById("psMapDiv").innerHTML = "";
  document.getElementById("ps").style.display = "block";

  setTimeout(() => {
    if (psMapInst) { psMapInst.remove(); psMapInst = null; }
    if (t.lat) {
      const div = document.createElement("div");
      div.style.cssText = "width:100%;height:100%;";
      document.getElementById("psMapDiv").appendChild(div);
      psMapInst = L.map(div, {zoomControl:false, attributionControl:false}).setView([t.lat, t.lon], 13);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(psMapInst);
      L.marker([t.lat, t.lon]).addTo(psMapInst);
      psMapInst.invalidateSize();
    }
    setTimeout(() => {
      window.print();
      document.getElementById("ps").style.display = "none";
      if (psMapInst) { psMapInst.remove(); psMapInst = null; }
    }, 900);
  }, 150);
}

// Arrancar cuando el DOM esté listo
// Leaflet ya está cargado porque el <script> está antes de este bloque
document.addEventListener("DOMContentLoaded", initMainMap);
</script>
