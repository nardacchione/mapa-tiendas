<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mapa de Tiendas - Changomas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#1a1a2e;}
.shell{display:grid;grid-template-columns:320px 1fr;grid-template-rows:54px 1fr;height:100vh;overflow:hidden;}
.topbar{grid-column:1/-1;background:#1F3864;display:flex;align-items:center;gap:12px;padding:0 16px;}
.topbar-title{color:#fff;font-size:14px;font-weight:700;}
.topbar-badge{background:rgba(255,255,255,.18);color:#BDD7EE;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.upd-btn{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);padding:5px 12px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:600;}
.upd-btn:hover{background:rgba(255,255,255,.22);}
.upd-btn:disabled{opacity:.5;cursor:default;}
.spin-ico{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;}
.spinning{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.status{font-size:11px;color:#BDD7EE;min-width:100px;text-align:right;}
.sidebar{background:#fff;border-right:1px solid #dde3ed;display:flex;flex-direction:column;overflow:hidden;}
.search-area{padding:10px 12px;border-bottom:1px solid #eee;}
.search-area input{width:100%;padding:7px 10px;border:1px solid #cdd5e0;border-radius:5px;font-size:13px;outline:none;}
.search-area input:focus{border-color:#2E75B6;}
.frow{display:flex;gap:5px;margin-top:6px;}
.frow select{flex:1;padding:5px 6px;border:1px solid #cdd5e0;border-radius:5px;font-size:11px;background:#fff;}
.list-wrap{overflow-y:auto;flex:1;}
.item{padding:8px 12px;border-bottom:1px solid #f0f2f6;cursor:pointer;}
.item:hover{background:#f5f8fc;}
.item.active{background:#EBF3FC;border-left:3px solid #2E75B6;padding-left:9px;}
.item-top{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.iname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1a1a2e;flex:1;}
.isub{font-size:10px;color:#888;margin-bottom:4px;padding-left:16px;}
.ec-chips{display:flex;flex-wrap:wrap;gap:3px;padding-left:16px;}
.ec-chip-on{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;background:#C6EFCE;color:#375623;}
.frm-chip{background:#DDEBF7;color:#1F3864;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;}
.empty{padding:24px;text-align:center;color:#aaa;font-size:13px;}
#map{width:100%;height:100%;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.card{background:#fff;border-radius:10px;width:480px;max-width:95vw;overflow:hidden;display:flex;flex-direction:column;}
.card-hd{background:#1F3864;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.fbadge{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:800;}
.card-hd h2{color:#fff;font-size:14px;font-weight:700;flex:1;margin:0;}
.xbtn{background:none;border:none;color:rgba(255,255,255,.6);font-size:24px;cursor:pointer;line-height:1;}
.xbtn:hover{color:#fff;}
.mmap{height:155px;width:100%;flex-shrink:0;}
.card-body{padding:14px 16px 16px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;margin-bottom:12px;}
.f{display:flex;flex-direction:column;gap:3px;}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#aaa;}
.fv{font-size:13px;font-weight:600;color:#1a1a2e;}
.fpill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700;}
.fd{grid-column:1/-1;}
.divider{border:none;border-top:1px solid #eee;margin:0 0 10px;}
.ec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin-bottom:7px;}
.chips-big{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.chip-on{background:#C6EFCE;color:#375623;font-size:12px;font-weight:700;padding:4px 10px;border-radius:5px;}
.chip-off{background:#f0f0f0;color:#ccc;font-size:12px;font-weight:700;padding:4px 10px;border-radius:5px;text-decoration:line-through;}
.fbadge2{background:#DDEBF7;color:#1F3864;font-size:12px;font-weight:700;padding:3px 10px;border-radius:4px;}
.form-row{display:flex;align-items:center;gap:8px;}
.form-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#aaa;}
.cfoot{display:flex;justify-content:flex-end;gap:7px;padding-top:12px;border-top:1px solid #eee;}
.btn{padding:6px 14px;border-radius:5px;font-size:12px;cursor:pointer;font-weight:700;border:1px solid;}
.btnp{background:#1F3864;color:#fff;border-color:#1F3864;}
.btns{background:#fff;color:#666;border-color:#ccc;}
.btn:hover{opacity:.85;}
@media print{
  @page{size:A4 portrait;margin:13mm 11mm;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .shell,.ov{display:none!important;}
  .ps{display:block!important;}
}
.ps{display:none;}
.ps-hd{display:flex;align-items:center;gap:14px;border-bottom:3px solid #1F3864;padding-bottom:10px;margin-bottom:14px;}
.ps-badge{padding:5px 12px;border-radius:6px;font-size:13px;font-weight:800;}
.ps-hd h1{font-size:18px;font-weight:800;color:#1F3864;}
.ps-hd p{font-size:11px;color:#666;margin-top:2px;}
.ps-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px 14px;margin-bottom:12px;}
.ps-f{display:flex;flex-direction:column;gap:2px;}
.ps-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888;}
.ps-v{font-size:12px;font-weight:600;color:#1a1a2e;}
.ps-fd{grid-column:1/-1;}
.ps-div{border:none;border-top:1px solid #eee;margin:10px 0;}
.ps-ec-title{font-size:9px;font-weight:700;text-transform:uppercase;color:#888;margin-bottom:6px;}
.ps-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.ps-chip-on{background:#C6EFCE;color:#375623;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;}
.ps-chip-off{background:#f0f0f0;color:#ccc;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;text-decoration:line-through;}
.ps-map{height:195px;border:1px solid #ccc;border-radius:6px;overflow:hidden;margin-top:10px;}
.ps-foot{font-size:9px;color:#aaa;text-align:right;border-top:1px solid #eee;padding-top:5px;margin-top:8px;}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span class="topbar-title">Mapa de Tiendas &#8212; Changomas</span>
    <span class="topbar-badge" id="badge">cargando...</span>
    <button class="upd-btn" id="updBtn" onclick="reloadData()">
      <span class="spin-ico" id="spinIco"></span>
      Actualizar datos
    </button>
    <span class="status" id="statusTxt"></span>
  </div>
  <div class="sidebar">
    <div class="search-area">
      <input id="q" type="text" placeholder="Buscar n&#xFA;mero, nombre, ciudad..." oninput="applyFilter()">
      <div class="frow">
        <select id="fc" onchange="applyFilter()">
          <option value="">Todos los coordinadores</option>
          <option value="German Haller">German Haller</option>
          <option value="Nicolas Castiglione">Nicolas Castiglione</option>
          <option value="Pedro Nardacchione">Pedro Nardacchione</option>
        </select>
        <select id="ff" onchange="applyFilter()">
          <option value="">Todos los formatos</option>
          <option value="HC">Hiper Changomas</option>
          <option value="CH">Changomas</option>
          <option value="SC">Super Changomas</option>
        </select>
      </div>
    </div>
    <div class="list-wrap" id="listWrap"></div>
  </div>
  <div id="map"></div>
</div>

<div class="ov" id="ov">
  <div class="card">
    <div class="card-hd">
      <span class="fbadge" id="cFmt"></span>
      <h2 id="cTitle"></h2>
      <button class="xbtn" onclick="closeOvD()">&times;</button>
    </div>
    <div class="mmap" id="mmap"></div>
    <div class="card-body">
      <div class="fg">
        <div class="f"><span class="fl">Coordinador</span><span class="fv" id="cCoord"></span></div>
        <div class="f"><span class="fl">Director</span><span class="fv" id="cDir"></span></div>
        <div class="f"><span class="fl">Gerente</span><span class="fv" id="cGer"></span></div>
        <div class="f fd"><span class="fl">Direcci&#xF3;n</span><span class="fv" id="cAddr"></span></div>
      </div>
      <hr class="divider">
      <div class="ec-label">E-Commerce</div>
      <div class="chips-big" id="cChips"></div>
      <div class="form-row">
        <span class="form-lbl">Formulario:</span>
        <span id="cForm"></span>
      </div>
      <div class="cfoot">
        <button class="btn btns" onclick="closeOvD()">Cerrar</button>
        <button class="btn btnp" onclick="doPrint()">Imprimir ficha A4</button>
      </div>
    </div>
  </div>
</div>

<div class="ps" id="ps">
  <div class="ps-hd">
    <span class="ps-badge" id="psBadge"></span>
    <div><h1 id="psTitle"></h1><p id="psSub"></p></div>
  </div>
  <div class="ps-grid">
    <div class="ps-f"><span class="ps-l">Coordinador</span><span class="ps-v" id="psCoord"></span></div>
    <div class="ps-f"><span class="ps-l">Director</span><span class="ps-v" id="psDir"></span></div>
    <div class="ps-f"><span class="ps-l">Gerente</span><span class="ps-v" id="psGer"></span></div>
    <div class="ps-f ps-fd"><span class="ps-l">Direcci&#xF3;n</span><span class="ps-v" id="psDireccion"></span></div>
    <div class="ps-f"><span class="ps-l">Formato</span><span class="ps-v" id="psFmt"></span></div>
    <div class="ps-f"><span class="ps-l">N&#xFA;mero</span><span class="ps-v" id="psNum"></span></div>
  </div>
  <hr class="ps-div">
  <div class="ps-ec-title">E-Commerce habilitado</div>
  <div class="ps-chips" id="psChips"></div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
    <span class="ps-l">Formulario:</span><span id="psFrmBadge"></span>
  </div>
  <div class="ps-map" id="psMapDiv"></div>
  <div class="ps-foot" id="psFoot"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

var TS = JSON.parse(atob(_D64));

var CC = {"German Haller":{bg:"#E2EFDA",fg:"#375623"},"Nicolas Castiglione":{bg:"#DDEBF7",fg:"#1F3864"},"Pedro Nardacchione":{bg:"#FCE4D6",fg:"#833C00"}};
var FC = {HC:{bg:"#C6EFCE",fg:"#375623"},CH:{bg:"#DDEBF7",fg:"#1F3864"},SC:{bg:"#FCE4D6",fg:"#833C00"}};
var EC = [{k:"hd",l:"HD"},{k:"rt",l:"RT"},{k:"pickup",l:"PickUp"},{k:"envios",l:"Envios"},{k:"bandas",l:"Bandas 1hs"},{k:"multipick",l:"Multipicking"}];

var mainMap=null, miniInst=null, psInst=null, markers=[], current=null;

function mkIcon(t,active){
  var c=CC[t.coordinador]||{bg:"#eee",fg:"#555"};
  var sz=t.fmt==="HC"?18:t.fmt==="SC"?12:14;
  var br=t.fmt==="SC"?"3px":"50%";
  var bw=t.fmt==="HC"?3:2;
  var bc=active?"#E07B00":c.fg;
  return L.divIcon({className:"",html:"<div style='width:"+sz+"px;height:"+sz+"px;border-radius:"+br+";background:"+c.bg+";border:"+bw+"px solid "+bc+";box-sizing:border-box;'></div>",iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
}

function renderMarkers(list){
  for(var i=0;i<markers.length;i++) markers[i].remove();
  markers=[];
  for(var i=0;i<list.length;i++){
    (function(t){
      if(!t.lat) return;
      var m=L.marker([t.lat,t.lon],{icon:mkIcon(t,false)});
      m._n=t.num;
      m.on("click",function(){openStore(t);});
      m.addTo(mainMap);
      markers.push(m);
    })(list[i]);
  }
}

function ecSmall(t){
  var h="";
  for(var i=0;i<EC.length;i++){
    if(t[EC[i].k]==="SI") h+="<span class='ec-chip-on'>"+EC[i].l+"</span>";
  }
  if(t.form) h+="<span class='frm-chip'>"+esc(t.form)+"</span>";
  return h;
}

function ecBig(t,onC,offC){
  var h="";
  for(var i=0;i<EC.length;i++){
    h+="<span class='"+(t[EC[i].k]==="SI"?onC:offC)+"'>"+EC[i].l+"</span>";
  }
  return h;
}

function renderList(list){
  document.getElementById("badge").textContent=list.length+" tiendas";
  var el=document.getElementById("listWrap");
  if(!list.length){el.innerHTML="<div class='empty'>Sin resultados</div>";return;}
  var html="";
  for(var i=0;i<list.length;i++){
    var t=list[i];
    var c=CC[t.coordinador]||{fg:"#888"};
    var chips=ecSmall(t);
    html+="<div class='item' id='i"+t.num+"' data-num='"+t.num+"'>"
        +"<div class='item-top'><div class='dot' style='background:"+c.fg+"'></div>"
        +"<span class='iname'>"+esc(t.nombre)+"</span></div>"
        +"<div class='isub'>"+t.num+" &middot; "+esc(t.fmt_label)+"</div>"
        +(chips?"<div class='ec-chips'>"+chips+"</div>":"")
        +"</div>";
  }
  el.innerHTML=html;
  var items=el.querySelectorAll(".item");
  for(var i=0;i<items.length;i++){
    (function(el){
      el.addEventListener("click",function(){
        var t=findT(el.getAttribute("data-num"));
        if(t) openStore(t);
      });
    })(items[i]);
  }
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function findT(num){for(var i=0;i<TS.length;i++)if(TS[i].num===num)return TS[i];return null;}

function applyFilter(){
  var q=document.getElementById("q").value.toLowerCase();
  var fc=document.getElementById("fc").value;
  var ff=document.getElementById("ff").value;
  var vis=[];
  for(var i=0;i<TS.length;i++){
    var t=TS[i];
    var mq=!q||t.num.indexOf(q)>=0||t.nombre.toLowerCase().indexOf(q)>=0
           ||t.coordinador.toLowerCase().indexOf(q)>=0||t.direccion.toLowerCase().indexOf(q)>=0;
    if(mq&&(!fc||t.coordinador===fc)&&(!ff||t.fmt===ff)) vis.push(t);
  }
  renderList(vis); renderMarkers(vis);
}

function openStore(t){
  current=t;
  for(var i=0;i<markers.length;i++){
    var s=findT(markers[i]._n);
    if(s) markers[i].setIcon(mkIcon(s,markers[i]._n===t.num));
  }
  document.querySelectorAll(".item").forEach(function(el){el.classList.remove("active");});
  var li=document.getElementById("i"+t.num);
  if(li){li.classList.add("active");li.scrollIntoView({block:"nearest"});}
  if(t.lat) mainMap.setView([t.lat,t.lon],13,{animate:true});

  var c=CC[t.coordinador]||{bg:"#eee",fg:"#333"};
  var f=FC[t.fmt]||{bg:"#eee",fg:"#333"};
  var fb=document.getElementById("cFmt");
  fb.textContent=t.fmt_label; fb.style.background=f.bg; fb.style.color=f.fg;
  document.getElementById("cTitle").textContent=t.num+" - "+t.nombre;
  document.getElementById("cCoord").innerHTML="<span class='fpill' style='background:"+c.bg+";color:"+c.fg+";'>"+esc(t.coordinador)+"</span>";
  document.getElementById("cDir").textContent=t.director;
  document.getElementById("cGer").textContent=t.gerente;
  document.getElementById("cAddr").textContent=t.direccion;
  document.getElementById("cChips").innerHTML=ecBig(t,"chip-on","chip-off");
  document.getElementById("cForm").innerHTML=t.form?"<span class='fbadge2'>"+esc(t.form)+"</span>":"<span style='color:#aaa;'>-</span>";
  document.getElementById("ov").classList.add("open");
  document.getElementById("mmap").innerHTML="";
  if(t.lat){
    setTimeout(function(){
      if(miniInst){miniInst.remove();miniInst=null;}
      var d=document.createElement("div");
      d.style.cssText="width:100%;height:100%;";
      document.getElementById("mmap").appendChild(d);
      miniInst=L.map(d,{zoomControl:false,attributionControl:false}).setView([t.lat,t.lon],14);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(miniInst);
      L.marker([t.lat,t.lon],{icon:mkIcon(t,true)}).addTo(miniInst);
      miniInst.invalidateSize();
    },60);
  }
}

function closeOvD(){
  document.getElementById("ov").classList.remove("open");
  if(miniInst){miniInst.remove();miniInst=null;}
}

function reloadData(){
  var btn=document.getElementById("updBtn"),ico=document.getElementById("spinIco"),st=document.getElementById("statusTxt");
  ico.classList.add("spinning"); btn.disabled=true; st.textContent="Cargando...";
  var xhr=new XMLHttpRequest();
  xhr.open("GET","tiendas_datos.csv?t="+Date.now(),true);
  xhr.onload=function(){
    if(xhr.status===200){
      var p=parseCSV(xhr.responseText);
      if(p.length>0){TS=p;st.textContent="Actualizado "+(new Date()).toLocaleTimeString("es-AR");}
      else st.textContent="CSV invalido";
    } else {
      st.textContent="Sin CSV - datos originales";
    }
    ico.classList.remove("spinning"); btn.disabled=false;
    renderList(TS); renderMarkers(TS); applyFilter();
  };
  xhr.onerror=function(){st.textContent="Error";ico.classList.remove("spinning");btn.disabled=false;};
  xhr.send();
}

function parseCSV(txt){
  var lines=txt.trim().split("
"); if(lines.length<2) return [];
  var result=[];
  for(var i=1;i<lines.length;i++){
    var v=lines[i].split(","); if(v.length<10) continue;
    var lat=parseFloat(v[9]),lon=parseFloat(v[10]);
    if(isNaN(lat)||isNaN(lon)) continue;
    result.push({num:(v[0]||"").trim(),nombre:(v[1]||"").trim(),fmt:(v[2]||"").trim(),
      fmt_label:(v[3]||"").trim(),coordinador:(v[4]||"").trim(),director:(v[5]||"").trim(),
      gerente:(v[7]||"").trim(),direccion:(v[8]||"").trim(),lat:lat,lon:lon,
      bandas:(v[11]||"NO").trim(),multipick:(v[12]||"NO").trim(),envios:(v[13]||"NO").trim(),
      hd:(v[14]||"NO").trim(),rt:(v[15]||"NO").trim(),pickup:(v[16]||"NO").trim(),form:(v[17]||"").trim()});
  }
  return result;
}

function doPrint(){
  if(!current) return;
  var t=current,c=CC[t.coordinador]||{bg:"#eee",fg:"#333"},f=FC[t.fmt]||{bg:"#eee",fg:"#333"};
  var pb=document.getElementById("psBadge");
  pb.textContent=t.fmt_label; pb.style.background=f.bg; pb.style.color=f.fg;
  document.getElementById("psTitle").textContent=t.num+" - "+t.nombre;
  document.getElementById("psSub").textContent="Changomas - Directorio de Tiendas";
  document.getElementById("psCoord").innerHTML="<span style='background:"+c.bg+";color:"+c.fg+";padding:1px 7px;border-radius:3px;'>"+esc(t.coordinador)+"</span>";
  document.getElementById("psDir").textContent=t.director;
  document.getElementById("psGer").textContent=t.gerente;
  document.getElementById("psFmt").textContent=t.fmt_label;
  document.getElementById("psNum").textContent=t.num;
  document.getElementById("psDireccion").textContent=t.direccion;
  document.getElementById("psChips").innerHTML=ecBig(t,"ps-chip-on","ps-chip-off");
  document.getElementById("psFrmBadge").innerHTML=t.form?"<span style='background:#DDEBF7;color:#1F3864;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700;'>"+esc(t.form)+"</span>":"<span style='color:#aaa;'>-</span>";
  document.getElementById("psFoot").textContent="Generado "+(new Date()).toLocaleDateString("es-AR",{day:"2-digit",month:"long",year:"numeric"})+" - Changomas";
  document.getElementById("psMapDiv").innerHTML="";
  document.getElementById("ps").style.display="block";
  setTimeout(function(){
    if(psInst){psInst.remove();psInst=null;}
    if(t.lat){
      var d=document.createElement("div"); d.style.cssText="width:100%;height:100%;";
      document.getElementById("psMapDiv").appendChild(d);
      psInst=L.map(d,{zoomControl:false,attributionControl:false}).setView([t.lat,t.lon],13);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(psInst);
      L.marker([t.lat,t.lon]).addTo(psInst);
      psInst.invalidateSize();
    }
    setTimeout(function(){
      window.print();
      document.getElementById("ps").style.display="none";
      if(psInst){psInst.remove();psInst=null;}
    },900);
  },150);
}

document.addEventListener("DOMContentLoaded", function(){
  mainMap = L.map("map", {center:[-36,-64], zoom:4});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {attribution:"© OpenStreetMap", maxZoom:19}).addTo(mainMap);
  renderMarkers(TS);
  renderList(TS);
});
</script>
